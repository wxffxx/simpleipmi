skill:
  name: "restart_service"
  description: "通过 SSH 重启指定的 systemd 服务"
  mode: "scripted"
  tags: ["system", "service", "recovery"]

  params:
    service:
      type: str
      required: true
      description: "要重启的服务名称 (systemd unit name)"
    max_retries:
      type: int
      default: 3
      range: [1, 10]
      description: "最大重试次数"

  safety:
    max_steps: 20
    max_duration: 120

  steps:
    - id: "restart_service"
      tool: "systemd.restart"
      args:
        unit: "{service}"
        sudo: true
      wait: 3

    - id: "check_status"
      tool: "systemd.status"
      args:
        unit: "{service}"
      expect: "active"
      retry: "{max_retries}"
      retry_delay: 5

    - id: "get_info"
      tool: "systemd.status"
      args:
        unit: "{service}"
      wait: 0.5
