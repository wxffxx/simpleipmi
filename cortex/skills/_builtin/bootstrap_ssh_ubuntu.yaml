skill:
  name: "_bootstrap_ssh_ubuntu"
  builtin: true
  description: "用 HID 在 Ubuntu 被控主机上自动安装并启动 OpenSSH Server"
  mode: "guided"
  tags: ["builtin", "ssh", "bootstrap", "ubuntu"]

  goal: |
    在 Ubuntu 系统上启用 SSH 远程访问：
    1. 打开终端 (Ctrl+Alt+T)
    2. 等待终端窗口出现
    3. 输入命令: sudo apt install -y openssh-server
    4. 如果提示输入密码，需要人工介入
    5. 等待安装完成
    6. 输入命令: sudo systemctl enable --now ssh
    7. 验证: systemctl is-active ssh 输出应为 "active"

  checkpoints:
    - name: "terminal_open"
      visual_hint: "终端窗口已打开，可以看到命令提示符"
    - name: "ssh_installed"
      visual_hint: "apt install 命令执行完成"
    - name: "ssh_started"
      visual_hint: "ssh 服务已启动"

  safety:
    max_steps: 25
    max_duration: 120
    require_confirmation_before: ["sudo_password"]

  recovery:
    on_stuck: "press Ctrl+C, then Ctrl+Alt+T to open new terminal"
