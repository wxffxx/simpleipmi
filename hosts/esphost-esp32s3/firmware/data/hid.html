<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SI BMC - HID 远程键鼠控制">
    <title>SI BMC — HID 远程控制</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/hid.css">
</head>
<body>
<div class="app-wrapper">

    <!-- ═══ Login Overlay ═══ -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <div class="navbar-logo">SI</div>
            <h2>SI BMC 控制台</h2>
            <p>ESP32-S3 · HID 远程控制</p>
            <div class="login-error" id="login-error">密码错误，请重试</div>
            <input type="password" id="login-password" placeholder="请输入密码" autocomplete="off">
            <button class="btn btn-primary" id="login-btn" onclick="doLogin()">登 录</button>
        </div>
    </div>

    <!-- ═══ Navigation ═══ -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">SI</div>
            <div>
                <div class="navbar-title">SI BMC Controller</div>
                <div class="navbar-subtitle">HID 远程控制</div>
            </div>
        </div>
        <ul class="navbar-nav">
            <li><a href="/" id="nav-dashboard">📊 Dashboard</a></li>
            <li><a href="/hid" class="active" id="nav-hid">⌨️ HID 控制</a></li>
        </ul>
        <div class="navbar-actions">
            <div class="conn-status disconnected" id="ws-status">
                <span class="status-dot offline"></span>
                连接中...
            </div>
        </div>
    </nav>

    <!-- ═══ HID Content ═══ -->
    <div class="hid-wrapper">

        <!-- Toolbar -->
        <div class="hid-toolbar">
            <div class="hid-toolbar-left">
                <div class="combo-panel">
                    <button class="combo-btn" data-combo="ctrl-alt-del" title="Ctrl+Alt+Delete">C+A+Del</button>
                    <button class="combo-btn" data-combo="alt-tab" title="Alt+Tab">Alt+Tab</button>
                    <button class="combo-btn" data-combo="alt-f4" title="Alt+F4">Alt+F4</button>
                    <button class="combo-btn" data-combo="win" title="Windows/Super">Win</button>
                    <button class="combo-btn" data-combo="ctrl-alt-f1" title="TTY1">TTY1</button>
                    <button class="combo-btn" data-combo="ctrl-alt-f7" title="GUI">GUI</button>
                    <button class="combo-btn" data-combo="prtsc" title="Print Screen">PrtSc</button>
                </div>
            </div>
            <div class="hid-toolbar-right">
                <button class="btn btn-sm" id="btn-toggle-kbd" onclick="toggleKeyboard()">⌨️ 键盘</button>
                <button class="btn btn-sm btn-danger" id="btn-release-all" onclick="releaseAll()">🔓 释放全部</button>
            </div>
        </div>

        <!-- HID Content -->
        <div class="hid-content">
            <!-- Touchpad -->
            <div class="touchpad-wrapper">
                <div class="touchpad" id="touchpad">
                    <div class="touchpad-label">
                        <span class="icon">🖱</span>
                        <span class="text">在此区域移动鼠标 · 点击即为左键</span>
                    </div>
                    <div class="touchpad-cursor" id="touchpad-cursor"></div>
                </div>
                <div class="touchpad-buttons">
                    <button class="mouse-btn left" id="mouse-left"
                            onmousedown="mouseBtn(0,true)" onmouseup="mouseBtn(0,false)"
                            ontouchstart="mouseBtn(0,true)" ontouchend="mouseBtn(0,false)">
                        左键
                    </button>
                    <button class="mouse-btn middle" id="mouse-middle"
                            onmousedown="mouseBtn(1,true)" onmouseup="mouseBtn(1,false)"
                            ontouchstart="mouseBtn(1,true)" ontouchend="mouseBtn(1,false)">
                        中键
                    </button>
                    <button class="mouse-btn right" id="mouse-right"
                            onmousedown="mouseBtn(2,true)" onmouseup="mouseBtn(2,false)"
                            ontouchstart="mouseBtn(2,true)" ontouchend="mouseBtn(2,false)">
                        右键
                    </button>
                </div>
            </div>

            <!-- Virtual Keyboard (toggleable) -->
            <div class="vkbd-container" id="vkbd-container" style="display:none;">
                <div class="vkbd-header">
                    <span class="vkbd-title">虚拟键盘 · 点击按键发送到目标主机</span>
                    <button class="vkbd-close" onclick="toggleKeyboard()">✕</button>
                </div>
                <div class="vkbd" id="vkbd">
                    <!-- Rendered by keyboard.js -->
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/keyboard.js"></script>
<script src="/js/hid.js"></script>
</body>
</html>
