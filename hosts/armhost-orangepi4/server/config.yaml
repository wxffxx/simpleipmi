# ============================================
# SI BMC Server Configuration
# Orange Pi CM4 (RK3566) Baseboard Management Controller
# ============================================

server:
  host: "0.0.0.0"
  port: 8080
  debug: false

# --- Video Capture (MS2109) ---
video:
  device: "/dev/video0"
  width: 1920
  height: 1080
  fps: 30
  format: "MJPG"                # V4L2 pixel format
  jpeg_quality: 85              # MJPEG encoding quality (1-100)
  fallback_width: 1280          # Fallback if 1080p fails
  fallback_height: 720
  fallback_fps: 30
  reconnect_interval: 3         # Seconds between reconnect attempts

# --- USB HID Gadget ---
hid:
  keyboard_device: "/dev/hidg0"
  mouse_device: "/dev/hidg1"
  # Screen resolution of the TARGET machine (for absolute mouse positioning)
  target_width: 1920
  target_height: 1080

# --- GPIO Configuration ---
# Orange Pi CM4 RK3566 GPIO mapping
# Format: GPIOx_Yz => bank x, group Y (A=0,B=1,C=2,D=3), pin z
# Linux GPIO number = bank*32 + group*8 + pin
#   GPIO1_A1 => 1*32 + 0*8 + 1 = 33
#   GPIO4_A6 => 4*32 + 0*8 + 6 = 134
#   GPIO4_C0 => 4*32 + 2*8 + 0 = 144
gpio:
  chip: "gpiochip0"             # Main GPIO chip (may vary)
  power:
    pin_name: "GPIO4_A6"        # PWR button signal
    linux_gpio: 134             # Calculated: 4*32 + 0*8 + 6
    direction: "out"
    active_low: false
    short_press_ms: 500         # Short press = power on
    long_press_ms: 5000         # Long press = force power off
  reset:
    pin_name: "GPIO1_A1"        # RST button signal
    linux_gpio: 33              # Calculated: 1*32 + 0*8 + 1
    direction: "out"
    active_low: false
    pulse_ms: 200               # Reset pulse duration
  power_status:
    pin_name: "GPIO4_C0"        # 12V detect (PCIe 12V voltage divider)
    linux_gpio: 144             # Calculated: 4*32 + 2*8 + 0
    direction: "in"
    active_low: false           # HIGH = 12V present = powered on
  # Extensible: add more GPIO definitions here
  # custom_gpios:
  #   - name: "led_status"
  #     linux_gpio: 150
  #     direction: "out"
  #   - name: "buzzer"
  #     linux_gpio: 151
  #     direction: "out"

# --- Authentication ---
auth:
  enabled: false                 # Set true for production
  secret_key: "change-me-in-production-si-bmc-2024"
  algorithm: "HS256"
  token_expire_minutes: 1440    # 24 hours
  default_user: "admin"
  default_password: "admin"     # CHANGE IN PRODUCTION

# --- Logging ---
logging:
  level: "INFO"                 # DEBUG, INFO, WARNING, ERROR
  max_lines: 500                # Max log lines kept in memory for dashboard
