<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SI BMC - Web Console Terminal">
    <title>SI BMC — Console</title>
    <link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
    <link rel="stylesheet" href="/static/css/main.css">
    <!-- xterm.js from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <style>
        /* ── Console Page Layout ── */
        .console-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 64px);
            padding: var(--space-md);
            gap: var(--space-md);
        }

        .console-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            flex-shrink: 0;
        }

        .console-toolbar-left {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .console-toolbar-right {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .console-status {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: 0.82rem;
        }

        .console-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            transition: background 0.3s;
        }

        .console-dot.connected {
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green-glow);
        }

        .console-title {
            font-weight: 600;
            font-size: 0.92rem;
        }

        .console-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .console-btn {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all var(--transition-base);
            font-family: var(--font-sans);
        }

        .console-btn:hover {
            border-color: var(--accent-blue);
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
        }

        .console-btn.danger:hover {
            border-color: var(--accent-red);
            background: var(--accent-red-dim);
        }

        .console-container {
            flex: 1;
            background: #0c0c0c;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        /* Overlay when disconnected */
        .console-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-md);
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .console-overlay.hidden { display: none; }

        .console-overlay-icon {
            font-size: 2.5rem;
            opacity: 0.7;
        }

        .console-overlay-text {
            font-size: 0.92rem;
            color: var(--text-muted);
        }

        .console-overlay-btn {
            padding: 10px 28px;
            border-radius: var(--radius-md);
            border: 1px solid var(--accent-green);
            background: var(--accent-green-dim);
            color: var(--accent-green);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            font-family: var(--font-sans);
            font-size: 0.92rem;
        }

        .console-overlay-btn:hover {
            background: rgba(16, 185, 129, 0.25);
            box-shadow: var(--shadow-glow-green);
        }

        /* xterm overrides for our theme */
        .xterm {
            padding: 8px;
        }
    </style>
</head>
<body>
<div class="app-wrapper">

    <!-- ═══ Navigation Bar ═══ -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">SI</div>
            <div>
                <div class="navbar-title">SI BMC Controller</div>
                <div class="navbar-subtitle">Orange Pi CM4 · RK3566</div>
            </div>
        </div>

        <ul class="navbar-nav">
            <li><a href="/" id="nav-dashboard">
                <span>📊</span> Dashboard
            </a></li>
            <li><a href="/kvm" id="nav-kvm">
                <span>🖥</span> KVM
            </a></li>
            <li><a href="/console" class="active" id="nav-console">
                <span>💻</span> Console
            </a></li>
        </ul>

        <div class="navbar-actions">
            <span id="power-badge" class="badge badge-info">CONSOLE</span>
        </div>
    </nav>

    <!-- ═══ Console Content ═══ -->
    <div class="console-wrapper">

        <!-- Toolbar -->
        <div class="console-toolbar">
            <div class="console-toolbar-left">
                <div class="console-status">
                    <div class="console-dot" id="conn-dot"></div>
                    <span id="conn-status">未连接</span>
                </div>
                <span class="console-title">Web Terminal</span>
                <span class="console-info" id="term-info">--</span>
            </div>
            <div class="console-toolbar-right">
                <button class="console-btn" id="btn-reconnect" title="重新连接">🔄 重连</button>
                <button class="console-btn" id="btn-clear" title="清屏">🧹 清屏</button>
                <button class="console-btn" id="btn-fullscreen" title="全屏">⛶ 全屏</button>
                <button class="console-btn danger" id="btn-disconnect" title="断开连接">⏻ 断开</button>
            </div>
        </div>

        <!-- Terminal -->
        <div class="console-container" id="console-container">
            <div id="terminal"></div>
            <div class="console-overlay" id="connect-overlay">
                <div class="console-overlay-icon">💻</div>
                <div class="console-overlay-text">点击连接到 BMC 终端</div>
                <button class="console-overlay-btn" id="btn-connect">连接终端</button>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
(function() {
    'use strict';

    let ws = null;
    let term = null;
    let fitAddon = null;
    let connected = false;

    const $ = id => document.getElementById(id);

    // ── Initialize xterm.js ──
    function initTerminal() {
        term = new Terminal({
            theme: {
                background: '#0c0c0c',
                foreground: '#e0e0e0',
                cursor: '#6366f1',
                cursorAccent: '#0c0c0c',
                selectionBackground: 'rgba(99,102,241,0.3)',
                black: '#1a1a2e',
                red: '#ef4444',
                green: '#10b981',
                yellow: '#f59e0b',
                blue: '#6366f1',
                magenta: '#a855f7',
                cyan: '#06b6d4',
                white: '#e0e0e0',
                brightBlack: '#6b7280',
                brightRed: '#f87171',
                brightGreen: '#34d399',
                brightYellow: '#fbbf24',
                brightBlue: '#818cf8',
                brightMagenta: '#c084fc',
                brightCyan: '#22d3ee',
                brightWhite: '#f9fafb',
            },
            fontFamily: '"JetBrains Mono", "Cascadia Code", "Fira Code", "Consolas", monospace',
            fontSize: 14,
            lineHeight: 1.3,
            cursorBlink: true,
            cursorStyle: 'bar',
            scrollback: 5000,
            allowProposedApi: true,
        });

        fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open($('terminal'));
        fitAddon.fit();

        // Send input to WebSocket
        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ input: data }));
            }
        });

        // Handle resize
        term.onResize(({ cols, rows }) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ resize: { cols, rows } }));
            }
            $('term-info').textContent = `${cols}×${rows}`;
        });

        // Window resize → fit terminal
        const resizeObserver = new ResizeObserver(() => {
            if (fitAddon) fitAddon.fit();
        });
        resizeObserver.observe($('console-container'));

        $('term-info').textContent = `${term.cols}×${term.rows}`;
    }

    // ── WebSocket Connection ──
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) return;

        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/api/ws/terminal`);

        ws.onopen = () => {
            connected = true;
            $('conn-dot').classList.add('connected');
            $('conn-status').textContent = '已连接';
            $('connect-overlay').classList.add('hidden');
            term.focus();

            // Send initial terminal size
            if (fitAddon) fitAddon.fit();
            ws.send(JSON.stringify({
                cols: term.cols,
                rows: term.rows,
            }));

            term.writeln('\x1b[1;32m● 已连接到 BMC 终端\x1b[0m');
            term.writeln('');
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.output) {
                    term.write(msg.output);
                }
                if (msg.error) {
                    term.writeln(`\x1b[1;31m✕ ${msg.error}\x1b[0m`);
                }
            } catch (e) {
                // Raw text fallback
                term.write(event.data);
            }
        };

        ws.onclose = () => {
            connected = false;
            $('conn-dot').classList.remove('connected');
            $('conn-status').textContent = '已断开';
            term.writeln('');
            term.writeln('\x1b[1;31m● 连接已断开\x1b[0m');
        };

        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            term.writeln('\x1b[1;31m✕ WebSocket 连接错误\x1b[0m');
        };
    }

    function disconnect() {
        if (ws) {
            ws.close();
            ws = null;
        }
        connected = false;
        $('conn-dot').classList.remove('connected');
        $('conn-status').textContent = '已断开';
        $('connect-overlay').classList.remove('hidden');
    }

    // ── Event Listeners ──
    $('btn-connect').addEventListener('click', () => {
        if (!term) initTerminal();
        connect();
    });

    $('btn-reconnect').addEventListener('click', () => {
        if (ws) ws.close();
        setTimeout(() => {
            if (!term) initTerminal();
            term.clear();
            connect();
        }, 300);
    });

    $('btn-clear').addEventListener('click', () => {
        if (term) term.clear();
    });

    $('btn-fullscreen').addEventListener('click', () => {
        const el = $('console-container');
        if (document.fullscreenElement) {
            document.exitFullscreen();
        } else {
            el.requestFullscreen().then(() => {
                setTimeout(() => fitAddon && fitAddon.fit(), 200);
            });
        }
    });

    $('btn-disconnect').addEventListener('click', disconnect);

    // Auto-connect on page load
    initTerminal();
    connect();
})();
</script>
</body>
</html>
