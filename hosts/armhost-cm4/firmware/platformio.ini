; ============================================================
; SI BMC — ESP32-S3 USB HID Bridge
; PlatformIO build configuration
;
; Uses proven HID stack from esphost(esp32s3)
; Receives commands via UART, outputs USB HID to target machine
; ============================================================

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

build_flags =
    -DARDUINO_USB_MODE=0          ; Native USB (TinyUSB) for HID
    -DARDUINO_USB_CDC_ON_BOOT=0   ; Serial goes to UART0, not USB
    -DBOARD_HAS_PSRAM=0

; Library dependencies (same as esphost for HID compatibility)
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
