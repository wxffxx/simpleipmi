# ============================================
# SI BMC Server Configuration
# Generic CM4-compatible version (ESP32-S3 HID)
# ============================================

server:
  host: "0.0.0.0"
  port: 8080
  debug: false

# --- Video Capture (MS2109) ---
video:
  device: "/dev/video0"
  width: 1920
  height: 1080
  fps: 30
  format: "MJPG"                # V4L2 pixel format
  jpeg_quality: 85              # MJPEG encoding quality (1-100)
  fallback_width: 1280          # Fallback if 1080p fails
  fallback_height: 720
  fallback_fps: 30
  reconnect_interval: 3         # Seconds between reconnect attempts

# --- HID (ESP32-S3 Serial Bridge) ---
hid:
  mode: "serial"                  # "serial" (ESP32-S3 bridge) or "gadget" (legacy ConfigFS)
  serial_port: "auto"             # "auto" = scan all ports, or fixed e.g. "/dev/ttyS1"
  serial_baud: 115200
  heartbeat_interval: 5           # Heartbeat check interval (seconds)
  probe_timeout: 0.5              # Per-port probe timeout (seconds)
  auto_save_port: true            # Auto-save detected port to config
  # Legacy ConfigFS fallback (used when mode: "gadget")
  keyboard_device: "/dev/hidg0"
  mouse_device: "/dev/hidg1"
  target_width: 1920
  target_height: 1080

# --- ESP32-S3 OTA Flasher ---
# GPIO pins connected to ESP32-S3 EN and GPIO0 for download mode control
# Set to null to disable OTA flashing
esp32_flasher:
  en_gpio: null                     # Linux GPIO number → ESP32 EN pin (set per board)
  boot_gpio: null                   # Linux GPIO number → ESP32 GPIO0 pin (set per board)
  firmware_dir: "/opt/si-bmc/firmware"  # Directory to store uploaded firmware files

# --- GPIO Configuration ---
# Must be customized per carrier board
gpio:
  chip: "gpiochip0"
  power:
    pin_name: "PWR"
    linux_gpio: 134
    direction: "out"
    active_low: false
    short_press_ms: 500
    long_press_ms: 5000
  reset:
    pin_name: "RST"
    linux_gpio: 33
    direction: "out"
    active_low: false
    pulse_ms: 200
  power_status:
    pin_name: "12V_DETECT"
    linux_gpio: 144
    direction: "in"
    active_low: false

# --- Authentication ---
auth:
  enabled: false
  secret_key: "change-me-in-production-si-bmc-2024"
  algorithm: "HS256"
  token_expire_minutes: 1440
  default_user: "admin"
  default_password: "admin"

# --- Logging ---
logging:
  level: "INFO"
  max_lines: 500
