<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SI BMC - KVM Remote Desktop Console">
    <title>SI BMC — KVM Remote Desktop</title>
    <link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/kvm.css">
</head>
<body>
<div class="app-wrapper">

    <!-- ═══ Navigation Bar ═══ -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">SI</div>
            <div>
                <div class="navbar-title">SI BMC Controller</div>
                <div class="navbar-subtitle">KVM Remote Desktop</div>
            </div>
        </div>

        <ul class="navbar-nav">
            <li><a href="/" id="nav-dashboard">
                <span>📊</span> Dashboard
            </a></li>
            <li><a href="/kvm" class="active" id="nav-kvm">
                <span>🖥</span> KVM
            </a></li>
            <li><a href="/console" id="nav-console">
                <span>💻</span> Console
            </a></li>
        </ul>

        <div class="navbar-actions">
            <div class="kvm-status disconnected" id="kvm-conn-status">
                <span class="status-dot"></span>
                连接中...
            </div>
        </div>
    </nav>

    <!-- ═══ KVM Wrapper ═══ -->
    <div class="kvm-wrapper">

        <!-- ── Toolbar ── -->
        <div class="kvm-toolbar">
            <div class="kvm-toolbar-left">
                <span class="kvm-fps" id="kvm-fps">-- FPS</span>
                <span class="text-xs text-muted" id="kvm-resolution">--</span>

                <div class="toolbar-divider"></div>

                <!-- Quality slider -->
                <div class="quality-slider">
                    <span class="toolbar-label">画质</span>
                    <input type="range" id="quality-slider" min="10" max="100" value="85" step="5">
                    <span class="quality-value" id="quality-value">85</span>
                </div>
            </div>

            <div class="kvm-toolbar-center">
                <!-- Combo key buttons -->
                <div class="combo-panel">
                    <button class="combo-btn" data-combo="ctrl-alt-del" title="Ctrl+Alt+Delete">C+A+Del</button>
                    <button class="combo-btn" data-combo="alt-tab" title="Alt+Tab">Alt+Tab</button>
                    <button class="combo-btn" data-combo="alt-f4" title="Alt+F4">Alt+F4</button>
                    <button class="combo-btn" data-combo="win" title="Windows/Super key">Win</button>
                    <button class="combo-btn" data-combo="ctrl-alt-f1" title="Switch to TTY1">TTY1</button>
                    <button class="combo-btn" data-combo="ctrl-alt-f7" title="Switch to GUI">GUI</button>
                    <button class="combo-btn" data-combo="print-screen" title="Print Screen">PrtSc</button>
                </div>
            </div>

            <div class="kvm-toolbar-right">
                <button class="btn btn-sm" id="btn-keyboard" title="虚拟键盘">
                    ⌨️ 软键盘
                </button>
                <button class="btn btn-sm btn-primary" id="btn-fullscreen" title="全屏">
                    ⛶ 全屏
                </button>
            </div>
        </div>

        <!-- ── Video Display ── -->
        <div class="kvm-display" id="kvm-display">
            <div class="kvm-video-container">
                <img class="kvm-video" id="kvm-video"
                     alt="KVM Video Stream">
                <canvas class="kvm-mouse-overlay" id="kvm-overlay"></canvas>
            </div>

            <!-- No signal overlay (hidden when streaming) -->
            <div class="kvm-no-signal" id="kvm-no-signal">
                <div class="kvm-no-signal-icon">📡</div>
                <div class="kvm-no-signal-text">正在等待视频信号...</div>
                <div class="text-xs text-muted mt-sm">请确认采集卡已连接且目标主机已开机</div>
            </div>
        </div>

        <!-- Custom cursor -->
        <div class="kvm-cursor" id="kvm-cursor"></div>
    </div>

    <!-- ═══ Virtual Keyboard ═══ -->
    <div class="vkbd-wrapper" id="vkbd-wrapper">
        <div class="vkbd-container">
            <div class="vkbd-header">
                <span class="vkbd-title">虚拟键盘</span>
                <button class="vkbd-close" id="vkbd-close" 
                        onclick="document.querySelector('.vkbd-wrapper').classList.remove('active')">✕</button>
            </div>
            <div id="vkbd">
                <!-- Virtual keyboard will be rendered here by keyboard.js -->
            </div>
        </div>
    </div>

</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/mouse.js"></script>
<script src="/static/js/keyboard.js"></script>
<script src="/static/js/kvm.js"></script>

<script>
    // Hide no-signal overlay when video loads
    const kvmVideo = document.getElementById('kvm-video');
    const noSignal = document.getElementById('kvm-no-signal');

    kvmVideo.addEventListener('load', () => {
        if (noSignal) noSignal.style.display = 'none';
    });

    kvmVideo.addEventListener('error', () => {
        if (noSignal) noSignal.style.display = '';
    });

    // Resize canvas overlay to match video
    function resizeOverlay() {
        const video = document.getElementById('kvm-video');
        const overlay = document.getElementById('kvm-overlay');
        if (video && overlay) {
            overlay.width = video.clientWidth;
            overlay.height = video.clientHeight;
            overlay.style.width = video.clientWidth + 'px';
            overlay.style.height = video.clientHeight + 'px';
        }
    }

    kvmVideo.addEventListener('load', resizeOverlay);
    window.addEventListener('resize', resizeOverlay);
    setTimeout(resizeOverlay, 1000);
</script>
</body>
</html>
